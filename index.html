<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinWise - Personal Finance Manager</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #6366F1;
            --accent: #EC4899;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --bg: #FAFAFA;
            --surface: #FFFFFF;
            --surface-secondary: #F9FAFB;
            --text-primary: #111827;
            --text-secondary: #6B7280;
            --border: #E5E7EB;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .navbar {
            background: var(--surface);
            padding: 20px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .navbar-brand {
            font-size: 24px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 32px;
            list-style: none;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--primary);
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 64px;
            width: 260px;
            height: calc(100vh - 64px);
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 24px 0;
            overflow-y: auto;
            z-index: 50;
        }

        .nav-menu {
            list-style: none;
        }

        .nav-menu-item {
            padding: 14px 24px;
            cursor: pointer;
            color: var(--text-secondary);
            font-weight: 600;
            transition: all 0.3s;
            margin: 4px 12px;
            border-radius: 10px;
            font-size: 14px;
        }

        .nav-menu-item:hover {
            background: var(--surface-secondary);
            color: var(--primary);
            transform: translateX(4px);
        }

        .nav-menu-item.active {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(236, 72, 153, 0.1));
            color: var(--primary);
            font-weight: 700;
        }

        .main {
            margin-left: 260px;
            padding: 40px 32px;
            min-height: calc(100vh - 64px);
        }

        .page {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .page-title {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 12px;
        }

        .page-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        .payoff-timeline {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .payoff-item {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.05), rgba(236, 72, 153, 0.05));
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            transition: all 0.3s;
        }

        .payoff-item:hover {
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.1);
        }

        .payoff-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 12px;
        }

        .payoff-name {
            font-size: 16px;
            font-weight: 800;
        }

        .payoff-date {
            font-size: 14px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .payoff-status {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            font-size: 12px;
            margin-bottom: 16px;
        }

        .payoff-stat {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
        }

        .payoff-stat-label {
            color: var(--text-secondary);
            font-size: 11px;
            text-transform: uppercase;
            margin-bottom: 4px;
            font-weight: 700;
        }

        .payoff-stat-value {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            font-size: 14px;
        }

        .savings-badge {
            display: block;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.15), rgba(16, 185, 129, 0.1));
            color: var(--success);
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            border: 1px solid rgba(16, 185, 129, 0.2);
            margin-top: 10px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: var(--surface-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            padding: 8px 16px;
            font-size: 12px;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            color: var(--text-primary);
            margin-bottom: 8px;
            font-weight: 700;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            background: var(--surface-secondary);
            color: var(--text-primary);
            transition: all 0.3s;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
            background: var(--surface);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 14px 16px;
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 800;
            text-transform: uppercase;
            border-bottom: 2px solid var(--border);
            background: var(--surface-secondary);
        }

        td {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--surface);
            padding: 32px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 22px;
            font-weight: 900;
            margin-bottom: 24px;
        }

        .modal-footer {
            display: flex;
            gap: 12px;
            margin-top: 28px;
            justify-content: flex-end;
        }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-secondary);
        }

        .chart-container {
            position: relative;
            height: 300px;
            margin-bottom: 24px;
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            .main {
                margin-left: 0;
                padding: 24px 16px;
            }
            .nav-links {
                display: none;
            }
            .payoff-status {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <!-- NAVBAR -->
    <div class="navbar">
        <div class="navbar-brand">💰 FinWise</div>
        <ul class="nav-links">
            <li><a onclick="switchPage('payoff');">⏱️ Smart Payoff</a></li>
            <li><a onclick="switchPage('transactions');">📝 Transactions</a></li>
        </ul>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <ul class="nav-menu">
            <li class="nav-menu-item active" onclick="switchPage('payoff')">
                ⏱️ Payoff Timeline
            </li>
            <li class="nav-menu-item" onclick="switchPage('debts')">
                💳 Debts
            </li>
            <li class="nav-menu-item" onclick="switchPage('transactions')">
                📝 Transactions
            </li>
        </ul>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">
        <!-- PAYOFF PAGE -->
        <div id="payoff" class="page active">
            <h1 class="page-title">⏱️ Smart Debt Payoff Timeline</h1>
            <p class="page-subtitle">
                Months to payoff now includes your actual payment history
            </p>
            <div id="payoffTimeline" class="payoff-timeline"></div>
        </div>

        <!-- DEBTS PAGE -->
        <div id="debts" class="page">
            <h1 class="page-title">💳 Debts</h1>
            <button class="btn btn-primary" style="margin-bottom: 24px;" onclick="openModal('addDebtModal')">
                ➕ Add Debt
            </button>
            <div id="debtsList"></div>
        </div>

        <!-- TRANSACTIONS PAGE -->
        <div id="transactions" class="page">
            <h1 class="page-title">📝 Transactions</h1>
            <button class="btn btn-primary" style="margin-bottom: 24px;" onclick="openModal('addTransactionModal')">
                ➕ Add Debt Payment
            </button>
            <div class="card">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Debt</th>
                            <th>Amount Paid</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="transactionsList"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- MODALS -->
    
    <!-- Add Debt Modal -->
    <div id="addDebtModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Add Debt</div>
            <form onsubmit="addDebt(event)">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="debtName" required>
                </div>
                <div class="form-group">
                    <label>Balance (R)</label>
                    <input type="number" id="debtBalance" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Interest Rate (% annual)</label>
                    <input type="number" id="debtRate" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Monthly Payment (R)</label>
                    <input type="number" id="debtPayment" step="0.01" required>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('addDebtModal')">
                        Cancel
                    </button>
                    <button type="submit" class="btn btn-primary">
                        Add
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Add Payment Modal -->
    <div id="addTransactionModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Add Debt Payment</div>
            <form onsubmit="addPayment(event)">
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="payDate" required>
                </div>
                <div class="form-group">
                    <label>Debt</label>
                    <select id="payDebt" required>
                        <option value="">Select Debt</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Amount (R)</label>
                    <input type="number" id="payAmount" step="0.01" required>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('addTransactionModal')">
                        Cancel
                    </button>
                    <button type="submit" class="btn btn-primary">
                        Add Payment
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- JAVASCRIPT -->
    <script>
        // Load data from localStorage
        let debts = JSON.parse(localStorage.getItem('debts')) || [
            {
                id: 1,
                name: 'Tymebank Personal',
                balance: 20259,
                rate: 26.25,
                payment: 2200
            },
            {
                id: 2,
                name: 'Nedbank Personal',
                balance: 51657,
                rate: 15.25,
                payment: 2246
            },
            {
                id: 3,
                name: 'Car Finance',
                balance: 69517,
                rate: 12.40,
                payment: 8695
            },
            {
                id: 4,
                name: 'House Bond',
                balance: 1036899,
                rate: 9.95,
                payment: 11499
            }
        ];

        let payments = JSON.parse(localStorage.getItem('payments')) || [];

        // Set today's date
        document.getElementById('payDate').valueAsDate = new Date();

        // Initial render
        renderAll();

        /**
         * Calculate payoff months using AVERAGE of actual payments
         * This makes the timeline smart - if you pay extra, it shows fewer months
         */
        function calculatePayoffSmartly(debtId) {
            const debt = debts.find(d => d.id === debtId);
            if (!debt) {
                return {
                    months: null,
                    totalInterest: 0,
                    avgPayment: debt.payment
                };
            }

            // Calculate AVERAGE payment from transaction history
            const debtPayments = payments.filter(p => p.debtId === debtId);
            let avgPayment = debt.payment;

            if (debtPayments.length > 0) {
                const totalPaid = debtPayments.reduce((sum, p) => sum + p.amount, 0);
                avgPayment = totalPaid / debtPayments.length;
            }

            // Run amortization calculation with average payment
            const monthlyRate = debt.rate / 100 / 12;
            let balance = debt.balance;
            let months = 0;
            let totalInterest = 0;
            const maxMonths = 600;

            while (balance > 0.01 && months < maxMonths) {
                const interestCharge = balance * monthlyRate;
                const principalPayment = avgPayment - interestCharge;

                if (principalPayment <= 0) {
                    return {
                        months: null,
                        totalInterest: 0,
                        avgPayment: avgPayment
                    };
                }

                totalInterest += interestCharge;
                balance -= principalPayment;
                months++;
            }

            return {
                months: months,
                totalInterest: totalInterest,
                avgPayment: avgPayment
            };
        }

        /**
         * Switch between pages
         */
        function switchPage(pageId) {
            // Hide all pages
            document.querySelectorAll('.page').forEach(p => {
                p.classList.remove('active');
            });

            // Show selected page
            document.getElementById(pageId).classList.add('active');

            // Update sidebar active state
            document.querySelectorAll('.nav-menu-item').forEach(item => {
                item.classList.remove('active');
            });
            event.target.closest('.nav-menu-item')?.classList.add('active');

            renderAll();
        }

        /**
         * Modal functions
         */
        function openModal(id) {
            document.getElementById(id).classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        // Close modal when clicking outside
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                }
            });
        });

        /**
         * Add a new debt
         */
        function addDebt(event) {
            event.preventDefault();

            debts.push({
                id: Date.now(),
                name: document.getElementById('debtName').value,
                balance: parseFloat(document.getElementById('debtBalance').value),
                rate: parseFloat(document.getElementById('debtRate').value),
                payment: parseFloat(document.getElementById('debtPayment').value)
            });

            localStorage.setItem('debts', JSON.stringify(debts));
            closeModal('addDebtModal');
            document.querySelector('#addDebtModal form').reset();
            updateDebtSelect();
            renderAll();
        }

        /**
         * Add a payment for a debt
         */
        function addPayment(event) {
            event.preventDefault();

            const debtId = parseInt(document.getElementById('payDebt').value);
            const amount = parseFloat(document.getElementById('payAmount').value);
            const date = document.getElementById('payDate').value;

            const debt = debts.find(d => d.id === debtId);
            if (debt) {
                // Reduce debt balance
                debt.balance -= amount;

                // Add payment record
                payments.push({
                    date: date,
                    debtId: debtId,
                    amount: amount,
                    debtName: debt.name
                });

                // Save to localStorage
                localStorage.setItem('debts', JSON.stringify(debts));
                localStorage.setItem('payments', JSON.stringify(payments));

                closeModal('addTransactionModal');
                document.querySelector('#addTransactionModal form').reset();
                document.getElementById('payDate').valueAsDate = new Date();
                renderAll();
            }
        }

        /**
         * Update debt dropdown in transaction modal
         */
        function updateDebtSelect() {
            const select = document.getElementById('payDebt');
            select.innerHTML = '<option value="">Select Debt</option>';

            debts.forEach(debt => {
                select.innerHTML += `<option value="${debt.id}">${debt.name}</option>`;
            });
        }

        /**
         * Main render function - updates all UI
         */
        function renderAll() {
            updateDebtSelect();

            // === RENDER PAYOFF TIMELINE ===
            const payoffHTML = debts.map(debt => {
                const { months, totalInterest, avgPayment } = calculatePayoffSmartly(debt.id);
                const totalPayments = payments.filter(p => p.debtId === debt.id).length;
                const totalPaid = payments
                    .filter(p => p.debtId === debt.id)
                    .reduce((sum, p) => sum + p.amount, 0);

                // Calculate payoff date
                let payoffDate = 'N/A';
                if (months) {
                    const date = new Date();
                    date.setMonth(date.getMonth() + months);
                    payoffDate = date.toLocaleDateString('en-ZA', {
                        year: 'numeric',
                        month: 'short'
                    });
                }

                const displayMonths = months ? Math.round(months) : '∞';
                const isPayingExtra = avgPayment > debt.payment;

                return `
                    <div class="payoff-item">
                        <div class="payoff-header">
                            <div class="payoff-name">${debt.name}</div>
                            <div class="payoff-date">${payoffDate}</div>
                        </div>

                        <div class="payoff-status">
                            <div class="payoff-stat">
                                <div class="payoff-stat-label">Balance</div>
                                <div class="payoff-stat-value">
                                    R${debt.balance.toLocaleString('en-ZA', { maximumFractionDigits: 0 })}
                                </div>
                            </div>
                            <div class="payoff-stat">
                                <div class="payoff-stat-label">Months Left</div>
                                <div class="payoff-stat-value">${displayMonths}</div>
                            </div>
                            <div class="payoff-stat">
                                <div class="payoff-stat-label">Avg Payment</div>
                                <div class="payoff-stat-value">
                                    R${avgPayment.toLocaleString('en-ZA', { maximumFractionDigits: 0 })}
                                </div>
                            </div>
                            <div class="payoff-stat">
                                <div class="payoff-stat-label">Interest (Est)</div>
                                <div class="payoff-stat-value">
                                    R${totalInterest.toLocaleString('en-ZA', { maximumFractionDigits: 0 })}
                                </div>
                            </div>
                        </div>

                        ${isPayingExtra ? `
                            <div class="savings-badge">
                                💪 Paying avg R${(avgPayment - debt.payment).toLocaleString('en-ZA', { maximumFractionDigits: 0 })} extra/month - saves time & interest!
                            </div>
                        ` : ''}

                        ${totalPaid > 0 ? `
                            <div class="savings-badge">
                                ✅ Total paid so far: R${totalPaid.toLocaleString('en-ZA', { maximumFractionDigits: 0 })} (${totalPayments} payments)
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');

            document.getElementById('payoffTimeline').innerHTML = payoffHTML ||
                '<div class="empty-state">No debts added yet</div>';

            // === RENDER DEBTS LIST ===
            document.getElementById('debtsList').innerHTML = debts.map(debt => `
                <div style="
                    background: white;
                    border: 1px solid #e5e7eb;
                    border-radius: 12px;
                    padding: 20px;
                    margin-bottom: 16px;
                ">
                    <div style="
                        display: flex;
                        justify-content: space-between;
                        margin-bottom: 12px;
                    ">
                        <div>
                            <div style="font-weight: 700; font-size: 16px;">
                                ${debt.name}
                            </div>
                            <div style="font-size: 12px; color: #9ca3af;">
                                ${debt.rate}% APR
                            </div>
                        </div>
                        <button class="btn btn-danger"
                            onclick="deleteDebt(${debt.id})">
                            Delete
                        </button>
                    </div>
                    <div style="
                        font-size: 24px;
                        font-weight: 900;
                        background: linear-gradient(135deg, #6366f1, #ec4899);
                        -webkit-background-clip: text;
                        -webkit-text-fill-color: transparent;
                    ">
                        R${debt.balance.toLocaleString('en-ZA', { maximumFractionDigits: 0 })}
                    </div>
                    <div style="font-size: 12px; color: #9ca3af; margin-top: 8px;">
                        Monthly: R${debt.payment.toLocaleString('en-ZA', { maximumFractionDigits: 0 })}
                    </div>
                </div>
            `).join('');

            // === RENDER TRANSACTIONS ===
            document.getElementById('transactionsList').innerHTML = payments.length === 0 ?
                '<tr><td colspan="4"><div class="empty-state">No payments recorded</div></td></tr>' :
                payments.map((payment, index) => `
                    <tr>
                        <td>${new Date(payment.date).toLocaleDateString()}</td>
                        <td>${payment.debtName}</td>
                        <td style="font-weight: 700;">
                            R${payment.amount.toLocaleString('en-ZA', { maximumFractionDigits: 0 })}
                        </td>
                        <td>
                            <button class="btn btn-danger btn-sm"
                                onclick="deletePayment(${index})">
                                Delete
                            </button>
                        </td>
                    </tr>
                `).join('');
        }

        /**
         * Delete a debt
         */
        function deleteDebt(debtId) {
            if (confirm('Delete this debt?')) {
                debts = debts.filter(d => d.id !== debtId);
                localStorage.setItem('debts', JSON.stringify(debts));
                renderAll();
            }
        }

        /**
         * Delete a payment
         */
        function deletePayment(index) {
            if (confirm('Delete this payment?')) {
                const payment = payments[index];
                const debt = debts.find(d => d.id === payment.debtId);

                // Restore balance when deleting payment
                if (debt) {
                    debt.balance += payment.amount;
                }

                payments.splice(index, 1);
                localStorage.setItem('debts', JSON.stringify(debts));
                localStorage.setItem('payments', JSON.stringify(payments));
                renderAll();
            }
        }
    </script>
</body>
</html>
